<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Password | Birkenstock S&CC Portugal</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  
  <style>
    /* Estilos para o botão de mostrar/ocultar password */
    .password-input-wrapper {
      position: relative;
      width: 100%;
    }
    
    .password-input-wrapper input {
      width: 100%;
      padding-right: 45px;
    }
    
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--birkenstock-gray);
      cursor: pointer;
      font-size: 18px;
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
    
    .toggle-password:hover {
      color: var(--birkenstock-blue);
    }
    
    .password-strength {
      height: 4px;
      margin-top: 6px;
      border-radius: 2px;
      background: #e2e8f0;
      transition: all 0.2s;
    }
    .strength-weak { background: var(--danger); width: 33%; }
    .strength-medium { background: var(--warning); width: 66%; }
    .strength-strong { background: var(--success); width: 100%; }
    #reset-message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    #reset-message.error {
      background: var(--danger-bg);
      color: var(--danger);
      display: block;
    }
    #reset-message.success {
      background: var(--success-bg);
      color: var(--success);
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-card-top">
        <div class="logo-large">
          BIRKENSTOCK
          <small>S&CC Portugal</small>
        </div>
      </div>

      <div class="login-card-body">
        <h2><i class="fas fa-lock"></i> Redefinir Password</h2>
        
        <div id="reset-message"></div>
        
        <div id="reset-form">
          <div class="fg">
            <label>Email</label>
            <input type="email" id="reset-email" readonly style="background:#f5f5f5;">
          </div>
          
          <div class="fg">
            <label>Nova Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="toggle-password" onclick="togglePassword('new-password', this)">
                <i class="far fa-eye"></i>
              </button>
            </div>
            <div id="password-strength" class="password-strength"></div>
          </div>
          
          <div class="fg">
            <label>Confirmar Password</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', this)">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
          
          <button class="btnlogin" id="btn-reset-password">
            <i class="fas fa-save"></i> Guardar Nova Password
          </button>
        </div>
        
        <div id="reset-success" style="display:none; text-align: center;">
          <div style="font-size: 48px; color: var(--success); margin-bottom: 16px;">✅</div>
          <h3 style="color: var(--birkenstock-blue); margin-bottom: 16px;">Password Atualizada!</h3>
          <p style="margin-bottom: 24px; color: var(--birkenstock-gray);">A sua password foi alterada com sucesso.</p>
          <a href="login.html" class="btnlogin" style="display: inline-block; text-decoration: none; width: auto; padding: 12px 32px;">
            <i class="fas fa-sign-in-alt"></i> Fazer Login
          </a>
        </div>
        
        <div class="password-hint">
          <a href="login.html"><i class="fas fa-arrow-left"></i> Voltar ao Login</a>
        </div>
      </div>
      
      <div class="login-footer">
        &copy; 2026 Birkenstock S&CC Portugal · Plataforma de Formação
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  
  <script>
    // ==================== FUNÇÃO PARA MOSTRAR/OCULTAR PASSWORD ====================
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector('i');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }
    
    // Tornar a função global
    window.togglePassword = togglePassword;

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');
    
    const resetEmail = document.getElementById('reset-email');
    const resetForm = document.getElementById('reset-form');
    const resetSuccess = document.getElementById('reset-success');
    const resetMessage = document.getElementById('reset-message');
    const newPassword = document.getElementById('new-password');
    const confirmPassword = document.getElementById('confirm-password');
    const btnReset = document.getElementById('btn-reset-password');
    const strengthDiv = document.getElementById('password-strength');
    
    // Verificar token
    if (!token || !email) {
      resetForm.style.display = 'none';
      resetMessage.innerHTML = '❌ Link inválido ou expirado.';
      resetMessage.className = 'error';
    } else {
      const decodedEmail = decodeURIComponent(email);
      resetEmail.value = decodedEmail;
      
      // Validar token
      if (!window.validateResetToken || !window.validateResetToken(token, decodedEmail)) {
        resetForm.style.display = 'none';
        resetMessage.innerHTML = '❌ Link expirado. Solicite um novo.';
        resetMessage.className = 'error';
      }
    }
    
    // Password strength checker
    function checkPasswordStrength(pass) {
      let strength = 0;
      if (pass.length >= 8) strength++;
      if (/[A-Z]/.test(pass)) strength++;
      if (/[0-9]/.test(pass)) strength++;
      if (/[^a-zA-Z0-9]/.test(pass)) strength++;
      
      strengthDiv.className = 'password-strength';
      if (strength <= 1) {
        strengthDiv.classList.add('strength-weak');
      } else if (strength <= 2) {
        strengthDiv.classList.add('strength-medium');
      } else {
        strengthDiv.classList.add('strength-strong');
      }
    }
    
    newPassword.addEventListener('input', () => {
      checkPasswordStrength(newPassword.value);
    });
    
    // Reset password
    btnReset.addEventListener('click', async () => {
      const pass = newPassword.value;
      const confirm = confirmPassword.value;
      const userEmail = decodeURIComponent(email);
      
      // Reset message
      resetMessage.className = '';
      resetMessage.innerHTML = '';
      
      if (!pass || !confirm) {
        resetMessage.innerHTML = '❌ Preencha todos os campos.';
        resetMessage.className = 'error';
        return;
      }
      
      if (pass !== confirm) {
        resetMessage.innerHTML = '❌ As passwords não coincidem.';
        resetMessage.className = 'error';
        return;
      }
      
      if (pass.length < 6) {
        resetMessage.innerHTML = '❌ A password deve ter pelo menos 6 caracteres.';
        resetMessage.className = 'error';
        return;
      }
      
      btnReset.disabled = true;
      btnReset.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A processar...';
      
      // Usar a função saveNewPassword do auth.js
      const result = await window.saveNewPassword(userEmail, pass);
      
      if (result.success) {
        resetForm.style.display = 'none';
        resetSuccess.style.display = 'block';
        if (window.showToast) {
          window.showToast('✅ Password atualizada com sucesso!');
        }
      } else {
        resetMessage.innerHTML = `❌ ${result.message}`;
        resetMessage.className = 'error';
        btnReset.disabled = false;
        btnReset.innerHTML = '<i class="fas fa-save"></i> Guardar Nova Password';
      }
    });
    
    // Enter key to submit
    confirmPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        btnReset.click();
      }
    });
  </script>
</body>
</html>
